name: Release

on:
  release:
    types: [created]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create release zip
        run: zip -r animation-card.zip animation-card.js hacs.json icons/

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: animation-card.zip
