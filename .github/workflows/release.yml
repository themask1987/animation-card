name: Release

on:
  release:
    types: [created]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create icons zip
        run: zip -r icons.zip icons/

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            animation-card.js
            hacs.json
            icons.zip
